name: Build Flutter APK

on:
  push: # 当代码被推送到 main 分支时触发
    branches: [ main ]
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 1. 拉取代码

      - uses: actions/setup-java@v4 # 2. 设置 Java 环境
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter # 3. 设置 Flutter 环境[reference:11]
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get # 4. 获取项目依赖

      - run: flutter build apk --release # 5. 构建 Release 版 APK[reference:12]

      - name: Upload APK # 6. 上传 APK 作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
